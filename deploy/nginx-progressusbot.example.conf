# Пример для nginx: progressusbot.ru → FastAPI на 8088.
# Подставьте пути к сертификатам (certbot) и при необходимости client_max_body_size.

server {
    listen 443 ssl http2;
    server_name progressusbot.ru www.progressusbot.ru;

    ssl_certificate     /etc/letsencrypt/live/progressusbot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/progressusbot.ru/privkey.pem;

    client_max_body_size 32m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location /generate {
        proxy_pass http://127.0.0.1:8088/generate;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /edit {
        proxy_pass http://127.0.0.1:8088/edit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8088/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name progressusbot.ru www.progressusbot.ru;
    return 301 https://$host$request_uri;
}
