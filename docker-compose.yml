# Локальный или серверный запуск API.
#
#   docker compose up --build
#
# Режимы:
#   PROGRESSUSBOT_BACKEND=local     — всё в одном контейнере (тяжёлый старт).
#   PROGRESSUSBOT_BACKEND=langgraph — только HTTP-фасад; подними отдельно langgraph (см. compose ниже).

services:
  progressusbot-api:
    build: .
    ports:
      - "8088:8088"
    env_file:
      - .env
    environment:
      PROGRESSUSBOT_BACKEND: ${PROGRESSUSBOT_BACKEND:-local}
      LANGGRAPH_API_URL: ${LANGGRAPH_API_URL:-http://langgraph:2024}
      GIT_SSH_COMMAND: "ssh -i /run/secrets/git_deploy_key -o StrictHostKeyChecking=no"
    volumes:
      - ./git_deploy_key:/run/secrets/git_deploy_key:ro
    restart: unless-stopped

